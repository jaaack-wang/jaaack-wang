title: "Zhengxiang Wang"
description: "Personal site and blog"
url: "https://www.zhengxiang-wang.me"   # you already have a CNAME
baseurl: ""                              # leave empty for apex domain

# Keep your custom template; we’re not using a Jekyll theme
theme: null
markdown: kramdown

# Pretty blog URLs like /blog/2025/08/15/my-post/
permalink: /blogs/:year/:month/:slug/

# Posts before this year appear in /blogs/archive/ instead of /blogs/.
writing_archive_year: 2020

social_image: /images/me.png

# GitHub Pages allows this plugin; it auto-generates /feed.xml (RSS)
plugins:
  - jekyll-feed

# Local preview dependencies and generated files live here.
exclude:
  - Codex
